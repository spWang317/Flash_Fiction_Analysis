name: flashfiction_analysis
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
      - pandas==2.2.2
      - numpy==1.26.4
      - matplotlib==3.9.4
      - seaborn==0.13.2
      - scipy==1.11.4
      - statsmodels==0.14.6
      - scikit-learn==1.6.1
      - plotly==6.1.1
      - tqdm==4.67.1
      - kneed==0.8.5
      - torch>=2.4.0
      - transformers>=4.45.0
      - accelerate>=1.1.0
      - kss==6.0.6
      - konlpy==0.6.0
      - sentence-transformers
      - ipykernel
      - notebook
      - openpyxl
      # Note: 'bitsandbytes' is required for Server (Linux/CUDA) only.
      # For local analysis on Mac/Windows, please comment out or exclude it.